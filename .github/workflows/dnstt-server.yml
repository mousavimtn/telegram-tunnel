name: DNSTT Server
on:
  workflow_dispatch:
jobs:
  dnstt:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Setup DNSTT Server
        run: |
          # Install Python
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip install dnstt

          # Generate keys
          python3 -c "
          from dnstt import noise
          import os
          privkey = noise.GeneratePrivkey()
          pubkey = noise.PubkeyFromPrivkey(privkey)
          print('============= YOUR CONFIG =============')
          print(f'DOMAIN: v.example.com')
          print(f'PUBLIC KEY: {pubkey.hex()}')
          print(f'PRIVATE KEY: {privkey.hex()}')
          print('======================================')
          
          # Save keys for later use
          with open('/tmp/pubkey.txt', 'w') as f:
              f.write(pubkey.hex())
          with open('/tmp/privkey.txt', 'w') as f:
              f.write(privkey.hex())
          "

          # Start DNSTT server
          python3 -c "
          from dnstt import server
          import os
          with open('/tmp/privkey.txt') as f:
              privkey = bytes.fromhex(f.read().strip())
          server.run(privkey, 'v.example.com', '127.0.0.1:8080', '0.0.0.0:53')
          " &
          
          sleep 5
          echo "DNSTT Server is running on port 53"
          sleep 360
